name: Improve Cron Schedules

on:
  workflow_dispatch:

jobs:
  improve-cron-schedules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Improve cron schedule comments
        run: |
          cat > /tmp/improve_cron.py << 'EOF'
          import yaml
          import sys

          # Read the YAML file
          with open('cron_job.yaml', 'r') as f:
              data = yaml.safe_load(f)

          # Improved comments for each schedule
          schedules = data['on']['schedule']
          improved_comments = {
              '0 13 * * 1-5': 'Weekdays 1 PM UTC (7 AM MX, 10 AM CLT) - Check for manifests',
              '0 15 * * 1-5': 'Weekdays 3 PM UTC (9 AM MX, 12 PM CLT) - Check for manifests',
              '0 17 * * 1-5': 'Weekdays 5 PM UTC (11 AM MX, 2 PM CLT) - Check for manifests',
              '0 19 * * 1-5': 'Weekdays 7 PM UTC (1 PM MX, 4 PM CLT) - Check for manifests',
              '0 21 * * 1-5': 'Weekdays 9 PM UTC (3 PM MX, 6 PM CLT) - Check for manifests',
              '0 23 * * 1-5': 'Weekdays 11 PM UTC (5 PM MX, 8 PM CLT) - Check for manifests',
              '0 1 * * 2-6': 'Tue-Sat 1 AM UTC (7 PM MX, 10 PM CLT) - Check for manifests',
              '0 3 * * 2-6': 'Tue-Sat 3 AM UTC (9 PM MX, 12 AM CLT) - Check for manifests'
          }

          # Update the YAML file preserving structure
          output = 'name: cron_trigger_deploy\n\non:\n  schedule:\n'
          output += '    # The cron schedule is set to run at the following times, from Monday through Friday:\n'

          for schedule in schedules:
              cron_expr = schedule['cron']
              comment = improved_comments.get(cron_expr, cron_expr)
              output += f'    - cron: "{cron_expr}" # {comment}\n'

          output += '\ndefaults:\n  run:\n    shell: bash\n\njobs:\n  trigger:\n'
          output += '    runs-on: ubuntu-24.04\n    timeout-minutes: 2\n    steps:\n'
          output += '      - name: Execute workflow_dispatch on frappe for manifests\n'
          output += '        run: |\n'
          output += '          curl -X POST \\\n'
          output += '              -H "Accept: application/vnd.github.v3+json" \\\n'
          output += '              -H "Content-Type: application/json" \\\n'
          output += '              -H "Authorization: token ${{ secrets.GH_TOKEN_ACTIONS }}" \\\n'
          output += "              --data '{\"ref\": \"master\", \"inputs\": {\"choice\": \"develop\"}}' \\\n"
          output += '              https://api.github.com/repos/tech/custom-apps/actions/workflows/build_and_deploy.yaml/dispatches\n'
          output += "        if: github.event_name == 'schedule'\n"

          with open('cron_job.yaml', 'w') as f:
              f.write(output)

          print("✓ Updated cron_job.yaml with improved comments")
          EOF

          python3 /tmp/improve_cron.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'Improve cron schedule comments'
          title: 'Improve cron schedule comments for clarity'
          body: |
            This PR improves the comments in `cron_job.yaml` for better clarity:

            - Added descriptive timezone information
            - Clarified what each schedule triggers
            - Made comments consistent across all schedules

            Example improvements:
            - Before: `# 13 UTC - 7 AM MX, 10 AM CLT`
            - After: `# Weekdays 1 PM UTC (7 AM MX, 10 AM CLT) - Check for manifests`
          branch: improve/cron-comments
          delete-branch: true
