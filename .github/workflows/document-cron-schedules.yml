name: Improve Cron Schedules with Jules

on:
  workflow_dispatch:

jobs:
  improve-with-jules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # with:
        #   token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Jules session and improve cron comments
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          REPO_FULL_NAME: ${{ github.repository }}
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the prompt
          PROMPT="Improve the comments in the cron_job.yaml file. Make them more descriptive and clear.

          For each cron schedule:
          - Keep the time conversion format (UTC - MX, CLT)
          - Add what the schedule triggers
          - Be concise but informative

          Current schedules:
          - cron: \"0 13 * * 1-5\" # 13 UTC - 7 AM MX, 10 AM CLT
          - cron: \"0 15 * * 1-5\" # 15 UTC - 9 AM MX, 12 PM CLT
          - cron: \"0 17 * * 1-5\" # 17 UTC - 11 AM MX, 2 PM CLT
          - cron: \"0 19 * * 1-5\" # 19 UTC - 1 PM MX, 4 PM CLT
          - cron: \"0 21 * * 1-5\" # 21 UTC - 3 PM MX, 6 PM CLT
          - cron: \"0 23 * * 1-5\" # 23 UTC - 5 PM MX, 8 PM CLT
          - cron: \"0 1 * * 2-6\"  # 1 UTC - 7 PM MX, 10 PM CLT
          - cron: \"0 3 * * 2-6\"  # 3 UTC - 9 PM MX, 12 AM CLT

          Example improvement:
          - cron: \"0 13 * * 1-5\"  # Weekdays 1 PM UTC (7 AM MX, 10 AM CLT) - Check for manifests

          Make all comments consistent and clear."

          # Get latest commit info
          COMMIT_HASH=$(git rev-parse HEAD)
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)

          # Create Jules request payload
          cat > /tmp/jules_request.json << 'EOF'
          {
            "prompt": "$PROMPT",
            "sourceContext": {
              "source": "sources/github/$REPO_FULL_NAME",
              "githubRepoContext": {
                "startingBranch": "main"
              }
            },
            "requirePlanApproval": false,
            "automationMode": "AUTO_CREATE_PR"
          }
          EOF

          # Fix JSON formatting
          sed -i "s|\$PROMPT|$(printf '%s\n' "$PROMPT" | sed -e 's/[\/&]/\\&/g')|g" /tmp/jules_request.json

          # Call Jules API to create session
          echo "Creating Jules session..."
          RESPONSE=$(curl -s -X POST https://julius.googleapis.com/v1alpha/sessions \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -d @/tmp/julius_request.json)

          echo "Jules API Response:"
          echo "$RESPONSE" | jq '.'

          # Extract session name if successful
          SESSION_NAME=$(echo "$RESPONSE" | jq -r '.name // empty')

          if [ -n "$SESSION_NAME" ]; then
            echo "✓ Jules session created: $SESSION_NAME"

            # Poll for session completion
            MAX_ATTEMPTS=60
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              sleep 5
              STATUS=$(curl -s -X GET "https://julius.googleapis.com/v1alpha/$SESSION_NAME" \
                -H "X-Goog-Api-Key: $JULES_API_KEY" | jq -r '.state // empty')

              echo "Session state: $STATUS"

              if [ "$STATUS" = "COMPLETED" ]; then
                echo "✓ Jules session completed"
                break
              fi

              ATTEMPT=$((ATTEMPT + 1))
            done
          else
            echo "⚠ Failed to create Jules session"
            echo "$RESPONSE"
          fi

      # - name: Create Pull Request if changes exist
      #   uses: peter-evans/create-pull-request@v5
